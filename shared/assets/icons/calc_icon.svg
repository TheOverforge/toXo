<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" fill="none">
  <!-- Calculator body -->
  <rect x="2" y="1.5" width="12" height="13" rx="2" stroke="white" stroke-width="1.4"/>
  <!-- Display strip -->
  <rect x="3.5" y="3" width="9" height="3" rx="1" fill="white" opacity="0.35"/>
  <!-- Buttons 2x3 grid -->
  <rect x="3.5" y="7.5" width="2.5" height="1.8" rx="0.6" fill="white" opacity="0.6"/>
  <rect x="6.75" y="7.5" width="2.5" height="1.8" rx="0.6" fill="white" opacity="0.6"/>
  <rect x="10" y="7.5" width="2.5" height="1.8" rx="0.6" fill="white" opacity="0.6"/>
  <rect x="3.5" y="10.2" width="2.5" height="1.8" rx="0.6" fill="white" opacity="0.6"/>
  <rect x="6.75" y="10.2" width="2.5" height="1.8" rx="0.6" fill="white" opacity="0.6"/>
  <!-- Equals button (accent) -->
  <rect x="10" y="10.2" width="2.5" height="1.8" rx="0.6" fill="#0a84ff" opacity="0.9"/>
</svg>
